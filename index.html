<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kirodex</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div id="root"></div>
        <div
            id="error-fallback"
            style="
                display: none;
                position: fixed;
                inset: 0;
                background: #0d1117;
                color: #e6edf3;
                font-family: monospace;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                padding: 24px;
                text-align: center;
            "
        >
            <svg
                width="48"
                height="48"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#da3633"
                stroke-width="2"
            >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <h2 style="margin: 0; font-size: 18px; color: #da3633">
                App failed to load
            </h2>
            <p
                id="error-message"
                style="
                    margin: 0;
                    font-size: 13px;
                    color: #8b949e;
                    max-width: 480px;
                    white-space: pre-wrap;
                "
            ></p>
            <button
                onclick="location.reload()"
                style="
                    margin-top: 8px;
                    padding: 8px 20px;
                    background: #238636;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    cursor: pointer;
                    font-size: 13px;
                "
            >
                Reload
            </button>
        </div>
        <script type="module" src="/src/renderer/main.tsx"></script>
    </body>
</html>
